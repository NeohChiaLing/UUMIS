<div class="min-h-screen bg-transparent font-display text-slate-900 relative flex flex-col overflow-x-hidden">

  <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
    <div class="absolute -top-40 -right-40 w-[800px] h-[800px] bg-sky-200/40 rounded-full blur-[120px] bubble-float"></div>
    <div class="absolute top-1/4 -left-48 w-[600px] h-[600px] bg-blue-400/20 rounded-full blur-[100px] bubble-float-alt" style="animation-delay: -5s;"></div>
    <div class="absolute -bottom-20 left-1/3 w-[500px] h-[500px] bg-purple-200/30 rounded-full blur-[90px] bubble-float" style="animation-delay: -10s;"></div>

    <div class="absolute top-[15%] right-[15%] w-32 h-32 rounded-full glass-bubble border border-white/40 bubble-float z-10" style="animation-duration: 15s;"></div>
    <div class="absolute bottom-[20%] left-[10%] w-48 h-48 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -2s; animation-duration: 25s;"></div>
    <div class="absolute top-1/2 right-[5%] w-24 h-24 rounded-full glass-bubble border border-white/20 bubble-float z-10" style="animation-delay: -7s;"></div>
    <div class="absolute top-[10%] left-[20%] w-16 h-16 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -12s;"></div>

    <div class="absolute top-[20%] left-[10%] opacity-[0.08] transform -rotate-12 bubble-float text-slate-800" style="animation-duration: 20s;">
      <span translate="no" class="material-symbols-outlined notranslate text-[15rem]" style="font-variation-settings: 'wght' 100;">menu_book</span>
    </div>
    <div class="absolute bottom-[15%] right-[10%] opacity-[0.08] transform rotate-12 bubble-float-alt text-slate-800" style="animation-duration: 25s;">
      <span translate="no" class="material-symbols-outlined notranslate text-[18rem]" style="font-variation-settings: 'wght' 100;">school</span>
    </div>
  </div>

  <app-navbar></app-navbar>

  <section class="relative w-full h-[calc(100vh-80px)] min-h-[600px] flex items-center justify-center text-center group rounded-b-[3rem] sm:rounded-b-[4rem] overflow-hidden shadow-2xl mt-0">
    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-105 z-0"
         [style.background-image]="'url(' + (pageData.hero?.bgImage || pageData.bgImage || 'https://images.unsplash.com/photo-1541829070764-84a7d30dd3f3?auto=format&fit=crop&w=1920&q=80') + ')'">
    </div>

    <div class="absolute inset-0 bg-black/30 z-0"></div>

    <button *ngIf="isAdmin" (click)="openEditModal()" class="absolute top-6 right-6 z-50 bg-white border border-white hover:bg-sky-500 hover:text-white text-slate-800 rounded-full px-4 py-2 shadow-lg font-bold text-sm flex items-center gap-2 transition-all opacity-0 group-hover:opacity-100">
      <span translate="no" class="material-symbols-outlined notranslate text-[18px]">edit</span> Edit Page
    </button>

    <div class="relative z-10 flex flex-col items-center gap-8 max-w-4xl mx-auto px-4 sm:px-6 animate-fade-in-up mt-8">
      <div class="flex flex-col gap-4 items-center">
        <span class="inline-block px-4 py-1.5 rounded-full bg-sky-500/30 backdrop-blur-md border border-sky-400/30 text-sky-100 text-xs font-black uppercase tracking-wider w-fit shadow-lg">
          {{ pageData.hero?.badge || pageData.badge || 'STRUCTURE' }}
        </span>
        <h1 class="text-5xl sm:text-7xl md:text-8xl font-black leading-[1.1] tracking-tighter text-white drop-shadow-2xl">
          {{ pageData.hero?.titleStart || pageData.titleStart || 'Organizational' }} <br/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-300 to-sky-100 drop-shadow-lg">{{ pageData.hero?.titleHighlight || pageData.titleHighlight || 'Hierarchy' }}</span>
        </h1>
      </div>
    </div>
  </section>

  <main class="flex-grow w-full max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-12 relative group z-10">

    <div class="fixed bottom-8 right-8 z-[90] flex flex-col items-end gap-4">

      <button *ngIf="isAdmin" (click)="publishChanges()" class="bg-slate-900 text-white px-6 py-3 rounded-full font-black text-sm shadow-2xl hover:bg-sky-500 hover:scale-105 transition-all flex items-center gap-2 animate-fade-in-up border border-slate-700">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">cloud_upload</span> Publish Changes
      </button>

      @if (showLangModal) {
      <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl border border-white p-3 w-48 animate-fade-in-up flex flex-col gap-1">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-3 mt-1">Select Language</h3>
        <button (click)="switchLanguage('en')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-sky-50 hover:text-sky-500 font-bold text-sm transition-colors flex items-center gap-3"><span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">EN</span> English</button>
        <button (click)="switchLanguage('ms')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-sky-50 hover:text-sky-500 font-bold text-sm transition-colors flex items-center gap-3"><span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">MS</span> Melayu</button>
      </div>
      }
      <button (click)="toggleLangModal()" class="size-14 rounded-full bg-slate-900 text-white flex items-center justify-center shadow-2xl hover:scale-110 hover:bg-sky-500 transition-all cursor-pointer group border border-slate-700">
        <span translate="no" class="material-symbols-outlined notranslate text-2xl group-hover:scale-110 transition-transform">translate</span>
      </button>
    </div>

    <section class="py-8 md:py-12 animate-fade-in-up delay-200 mt-4">
      <div class="bg-white/80 backdrop-blur-md border border-white rounded-[2.5rem] p-4 md:p-12 shadow-xl overflow-hidden flex justify-center hover:border-sky-500/30 transition-all">
        <img [src]="pageData.chartImage"
             alt="UUMIS Organizational Structure Chart"
             class="max-w-full h-auto object-contain rounded-xl hover:scale-[1.02] transition-transform duration-500 mix-blend-darken">
      </div>
    </section>

  </main>

  <app-footer></app-footer>

  <div *ngIf="editMode" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined notranslate text-sky-500">edit_square</span> Edit Page
        </h2>
        <button (click)="closeEditModal()" class="text-slate-400 hover:text-red-500 transition-colors"><span translate="no" class="material-symbols-outlined notranslate">close</span></button>
      </div>

      <div class="p-6 flex flex-col gap-4 overflow-y-auto custom-scrollbar">
        <div><label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Badge Text</label><input type="text" [(ngModel)]="editData.badge" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none focus:border-sky-500"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Title (Black)</label><input type="text" [(ngModel)]="editData.titleStart" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none focus:border-sky-500"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Title (Highlight)</label><input type="text" [(ngModel)]="editData.titleHighlight" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none focus:border-sky-500"></div>

        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Background Image</label>
          <div class="flex items-center gap-4">
            <input type="file" #bgInput (change)="onFileSelected($event, 'bgImage')" accept="image/*" class="hidden">
            <button (click)="bgInput.click()" class="px-4 py-2 bg-sky-100 text-sky-700 font-bold rounded-lg hover:bg-sky-200 transition-colors flex items-center gap-2"><span translate="no" class="material-symbols-outlined notranslate text-[18px]">upload_file</span> Choose File</button>
            <div *ngIf="editData.bgImage" class="h-10 w-16 rounded bg-cover bg-center border border-slate-200" [style.background-image]="'url(' + editData.bgImage + ')'"></div>
          </div>
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Chart Image</label>
          <div class="flex items-center gap-4">
            <input type="file" #chartInput (change)="onFileSelected($event, 'chartImage')" accept="image/*" class="hidden">
            <button (click)="chartInput.click()" class="px-4 py-2 bg-sky-100 text-sky-700 font-bold rounded-lg hover:bg-sky-200 transition-colors flex items-center gap-2"><span translate="no" class="material-symbols-outlined notranslate text-[18px]">upload_file</span> Upload New Chart</button>
            <div *ngIf="editData.chartImage" class="h-10 w-16 rounded bg-cover bg-center border border-slate-200" [style.background-image]="'url(' + editData.chartImage + ')'"></div>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50 mt-auto">
        <button (click)="closeEditModal()" class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">Cancel</button>
        <button (click)="saveEdits()" class="px-6 py-2.5 rounded-xl font-bold bg-slate-900 text-white hover:bg-sky-500 shadow-lg transition-all flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined notranslate text-[18px]">save</span> Save
        </button>
      </div>
    </div>
  </div>
</div>
