<div class="min-h-screen bg-transparent font-display text-slate-900 relative flex flex-col overflow-x-hidden pb-32">
  <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
    <div class="absolute -top-40 -right-40 w-[800px] h-[800px] bg-sky-200/40 rounded-full blur-[120px] bubble-float"></div>
    <div class="absolute top-1/4 -left-48 w-[600px] h-[600px] bg-blue-400/20 rounded-full blur-[100px] bubble-float-alt" style="animation-delay: -5s;"></div>
    <div class="absolute -bottom-20 left-1/3 w-[500px] h-[500px] bg-purple-200/30 rounded-full blur-[90px] bubble-float" style="animation-delay: -10s;"></div>
    <div class="absolute top-[15%] right-[15%] w-32 h-32 rounded-full glass-bubble border border-white/40 bubble-float z-10" style="animation-duration: 15s;"></div>
    <div class="absolute bottom-[20%] left-[10%] w-48 h-48 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -2s; animation-duration: 25s;"></div>
    <div class="absolute top-1/2 right-[5%] w-24 h-24 rounded-full glass-bubble border border-white/20 bubble-float z-10" style="animation-delay: -7s;"></div>
    <div class="absolute top-[10%] left-[20%] w-16 h-16 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -12s;"></div>
    <div class="absolute top-[20%] left-[10%] opacity-[0.08] transform -rotate-12 bubble-float text-slate-800 hidden md:block" style="animation-duration: 20s;"><span translate="no" class="material-symbols-outlined notranslate text-[15rem]" style="font-variation-settings: 'wght' 100;">menu_book</span></div>
    <div class="absolute bottom-[15%] right-[10%] opacity-[0.08] transform rotate-12 bubble-float-alt text-slate-800 hidden md:block" style="animation-duration: 25s;"><span translate="no" class="material-symbols-outlined notranslate text-[18rem]" style="font-variation-settings: 'wght' 100;">school</span></div>
  </div>

  <app-navbar></app-navbar>

  <section class="relative w-full h-auto md:h-[calc(100vh-80px)] min-h-[500px] md:min-h-[600px] flex items-center justify-center text-center group rounded-b-[2rem] sm:rounded-b-[4rem] overflow-hidden shadow-2xl mt-0 py-16 md:py-0">
    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-105 z-0"
         [style.background-image]="'url(' + (pageData.hero?.bgImage || pageData.bgImage || 'https://images.unsplash.com/photo-1541829070764-84a7d30dd3f3?auto=format&fit=crop&w=1920&q=80') + ')'">
    </div>
    <div class="absolute inset-0 bg-black/40 z-0"></div>

    <button *ngIf="isAdmin" (click)="openEditModal()" class="absolute top-4 right-4 md:top-6 md:right-6 z-50 bg-white border border-white hover:bg-sky-500 hover:text-white text-slate-800 rounded-full px-4 py-2 shadow-lg font-bold text-sm flex items-center gap-2 transition-all opacity-100 md:opacity-0 group-hover:opacity-100">
      <span translate="no" class="material-symbols-outlined notranslate text-[18px]">edit</span> <span class="hidden md:inline">Edit Page</span>
    </button>

    <div class="relative z-10 flex flex-col items-center gap-6 max-w-4xl mx-auto px-4 sm:px-6 animate-fade-in-up mt-4 md:mt-8">
      <div class="flex flex-col gap-4 items-center">
        <span class="inline-block px-4 py-1.5 rounded-full bg-sky-500/30 backdrop-blur-md border border-sky-400/30 text-sky-100 text-xs font-black uppercase tracking-wider w-fit shadow-lg">
          {{ pageData.hero?.badge || pageData.badge || 'STRUCTURE' }}
        </span>
        <h1 class="text-4xl sm:text-6xl md:text-8xl font-black leading-[1.2] md:leading-[1.1] tracking-tighter text-white drop-shadow-2xl">
          {{ pageData.hero?.titleStart || pageData.titleStart || 'Organizational' }} <br class="hidden md:block"/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-300 to-sky-100 drop-shadow-lg">{{ pageData.hero?.titleHighlight || pageData.titleHighlight || 'Hierarchy' }}</span>
        </h1>
      </div>
    </div>
  </section>

  <main class="flex-grow w-full max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-12 relative group z-10">

    <div class="fixed bottom-24 right-4 md:right-8 z-[90] flex flex-col items-end gap-4">
      <button *ngIf="isAdmin" (click)="publishChanges()" class="bg-slate-900 text-white px-4 md:px-6 py-3 rounded-full font-black text-xs md:text-sm shadow-2xl hover:bg-sky-500 hover:scale-105 transition-all flex items-center gap-2 animate-fade-in-up border border-slate-700">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">cloud_upload</span> <span class="hidden md:inline">Publish Changes</span><span class="md:hidden">Save</span>
      </button>
    </div>

    <section class="py-4 md:py-12 animate-fade-in-up delay-200 mt-0 md:mt-4">
      <p class="text-xs text-slate-500 font-bold text-center mb-2 md:hidden flex items-center justify-center gap-1"><span translate="no" class="material-symbols-outlined notranslate text-[14px]">swipe</span> Swipe left to view full chart</p>

      <div class="bg-white/80 backdrop-blur-md border border-white rounded-[1.5rem] md:rounded-[2.5rem] p-2 sm:p-4 md:p-12 shadow-xl overflow-x-auto custom-scrollbar flex justify-start md:justify-center hover:border-sky-500/30 transition-all" style="-webkit-overflow-scrolling: touch;">
        <img [src]="pageData.chartImage"
             alt="UUMIS Organizational Structure Chart"
             class="max-w-none md:max-w-full min-w-[600px] h-auto object-contain rounded-xl hover:scale-[1.02] transition-transform duration-500 mix-blend-darken px-2">
      </div>
    </section>

  </main>
  <app-footer></app-footer>
</div>
