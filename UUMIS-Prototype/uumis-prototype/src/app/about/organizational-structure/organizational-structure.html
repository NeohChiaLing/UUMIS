<div class="min-h-screen bg-[#f8fcfa] font-display text-[#0e1b13] flex flex-col">
  <app-navbar></app-navbar>

  <main class="flex-grow w-full max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-12 relative group">

    <div class="fixed bottom-8 right-8 z-[90] flex flex-col items-end gap-4">

      <button *ngIf="isAdmin" (click)="publishChanges()" class="bg-[#0e1b13] text-white px-6 py-3 rounded-full font-black text-sm shadow-2xl hover:bg-[#30e87a] hover:text-[#0e1b13] hover:scale-105 transition-all flex items-center gap-2 animate-fade-in-up border border-[#e7f3ec]">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">cloud_upload</span> Publish Changes
      </button>

      @if (showLangModal) {
        <div class="bg-white rounded-2xl shadow-2xl border border-[#e7f3ec] p-3 w-48 animate-fade-in-up flex flex-col gap-1">
          <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-3 mt-1">Select Language</h3>
          <button (click)="switchLanguage('en')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-[#f0fdf4] hover:text-[#30e87a] font-bold text-sm transition-colors flex items-center gap-3"><span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">EN</span> English</button>
          <button (click)="switchLanguage('ms')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-[#f0fdf4] hover:text-[#30e87a] font-bold text-sm transition-colors flex items-center gap-3"><span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">MS</span> Melayu</button>
        </div>
      }
      <button (click)="toggleLangModal()" class="size-14 rounded-full bg-[#0e1b13] text-white flex items-center justify-center shadow-2xl hover:scale-110 hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all cursor-pointer group">
        <span translate="no" class="material-symbols-outlined notranslate text-2xl group-hover:scale-110 transition-transform">translate</span>
      </button>
    </div>

    <button *ngIf="isAdmin" (click)="openEditModal()" class="absolute top-0 right-4 z-50 bg-white border border-[#e7f3ec] hover:bg-[#30e87a] text-slate-800 rounded-full px-4 py-2 shadow-lg font-bold text-sm flex items-center gap-2 transition-all opacity-0 group-hover:opacity-100">
      <span translate="no" class="material-symbols-outlined text-[18px] notranslate">edit</span> Edit Page
    </button>

    <div class="text-center animate-fade-in-up pt-4">
      <span class="inline-block px-4 py-1.5 rounded-full bg-white border border-[#e7f3ec] text-[#30e87a] text-xs font-black uppercase tracking-wider mb-4 shadow-sm">
        {{ pageData.badge }}
      </span>
      <h1 class="text-3xl sm:text-4xl md:text-5xl font-black leading-tight tracking-tight text-[#0e1b13]">
        {{ pageData.titleStart }} <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#30e87a] to-emerald-600">{{ pageData.titleHighlight }}</span>
      </h1>
    </div>

    <section class="py-8 md:py-12 animate-fade-in-up delay-200">
      <div class="bg-white border border-[#e7f3ec] rounded-[2.5rem] p-4 md:p-12 shadow-xl overflow-hidden flex justify-center">
        <img [src]="pageData.chartImage"
             alt="UUMIS Organizational Structure Chart"
             class="max-w-full h-auto object-contain rounded-xl hover:scale-[1.02] transition-transform duration-500">
      </div>
    </section>

  </main>

  <app-footer></app-footer>

  <div *ngIf="editMode" class="fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined text-emerald-500 notranslate">edit_square</span> Edit Page
        </h2>
        <button (click)="closeEditModal()" class="text-slate-400 hover:text-red-500 transition-colors"><span translate="no" class="material-symbols-outlined notranslate">close</span></button>
      </div>

      <div class="p-6 flex flex-col gap-4 overflow-y-auto">
        <div><label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Badge Text</label><input type="text" [(ngModel)]="editData.badge" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Title (Black)</label><input type="text" [(ngModel)]="editData.titleStart" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Title (Green)</label><input type="text" [(ngModel)]="editData.titleHighlight" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none"></div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Chart Image</label>
          <div class="flex items-center gap-4">
            <input type="file" #chartInput (change)="onFileSelected($event)" accept="image/*" class="hidden">
            <button (click)="chartInput.click()" class="px-4 py-2 bg-emerald-100 text-emerald-700 font-bold rounded-lg hover:bg-emerald-200 transition-colors flex items-center gap-2"><span translate="no" class="material-symbols-outlined text-[18px] notranslate">upload_file</span> Upload New Chart</button>
            <div *ngIf="editData.chartImage" class="h-10 w-16 rounded bg-cover bg-center border border-slate-200" [style.background-image]="'url(' + editData.chartImage + ')'"></div>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50/50 mt-auto">
        <button (click)="closeEditModal()" class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">Cancel</button>
        <button (click)="saveEdits()" class="px-6 py-2.5 rounded-xl font-bold bg-[#0e1b13] text-white hover:bg-[#30e87a] hover:text-[#0e1b13] shadow-lg transition-all flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined text-[18px] notranslate">save</span> Save
        </button>
      </div>
    </div>
  </div>
</div>
