<div class="min-h-screen bg-[#f0fdf4] font-display text-slate-800 flex flex-col pb-32 md:pb-0">

  <header class="bg-white border-b border-emerald-100 px-4 md:px-8 py-6 md:py-8 flex flex-col gap-4 md:gap-6 sticky top-0 z-40 shadow-sm">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 md:gap-6">
      <div class="flex items-start md:items-center gap-3 md:gap-5 w-full md:w-auto">
        <button (click)="goBack()" class="size-10 md:size-11 shrink-0 flex items-center justify-center rounded-full bg-white border border-emerald-100 text-slate-400 hover:text-emerald-500 shadow-sm transition-all mt-1 md:mt-0">
          <span translate="no" class="material-symbols-outlined notranslate font-bold text-lg md:text-xl">arrow_back</span>
        </button>
        <div class="min-w-0">
          <h2 class="text-xl md:text-3xl font-black text-emerald-900 uppercase tracking-tight leading-tight">Student <span class="text-emerald-500">Schedule</span></h2>
          <p class="text-slate-400 text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] mt-0.5 md:mt-1 truncate">Manage Class Timings & Content</p>
        </div>
      </div>

      <div class="flex items-center gap-2 md:gap-3 w-full md:w-auto">
        <button *ngIf="isEditMode" (click)="addColumn()" class="flex-1 md:flex-none h-10 md:h-11 px-4 md:px-6 bg-[#f472b6] hover:bg-[#db2777] text-white rounded-xl md:rounded-2xl font-black uppercase text-[9px] md:text-[10px] tracking-widest shadow-lg shadow-pink-100 transition-all flex items-center justify-center gap-1.5 md:gap-2 transform hover:-translate-y-0.5 border border-[#db2777]">
          <span class="text-base md:text-lg font-bold leading-none mt-[-2px]">+</span><span>Add Col</span>
        </button>
        <button (click)="toggleEditMode()" [class]="isEditMode ? 'bg-orange-500 shadow-orange-200 border-orange-600 hover:bg-orange-600' : 'bg-emerald-500 shadow-emerald-200 border-emerald-600 hover:bg-emerald-600'" class="flex-1 md:flex-none h-10 md:h-11 px-4 md:px-6 text-white rounded-xl md:rounded-2xl font-black uppercase text-[9px] md:text-[10px] tracking-widest shadow-lg transition-all flex items-center justify-center gap-1.5 md:gap-2 transform hover:-translate-y-0.5 border">
          <span translate="no" class="material-symbols-outlined notranslate text-[16px] md:text-[18px]">{{ isEditMode ? 'close' : 'edit_calendar' }}</span>
          <span>{{ isEditMode ? 'Cancel' : 'Edit' }}</span>
        </button>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 md:gap-4 border-t border-emerald-50 pt-4 mt-2 md:mt-0">
      <div class="flex items-center gap-3 bg-slate-50 border border-slate-100 p-1.5 md:p-2 rounded-xl md:rounded-2xl flex-1">
        <span class="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest pl-2">Level:</span>
        <select [(ngModel)]="selectedLevel" (change)="onSelectionChange()" class="w-full bg-white border border-slate-200 rounded-lg md:rounded-xl px-2 md:px-4 py-2 text-xs md:text-sm font-black text-emerald-700 outline-none cursor-pointer focus:border-emerald-400 transition-colors shadow-sm">
          <option *ngFor="let lvl of levels" [value]="lvl">{{lvl}}</option>
        </select>
      </div>

      <div class="flex items-center gap-3 bg-slate-50 border border-slate-100 p-1.5 md:p-2 rounded-xl md:rounded-2xl flex-1">
        <span class="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest pl-2">Year:</span>
        <select [(ngModel)]="selectedYear" (change)="onSelectionChange()" class="w-full bg-white border border-slate-200 rounded-lg md:rounded-xl px-2 md:px-4 py-2 text-xs md:text-sm font-black text-emerald-700 outline-none cursor-pointer focus:border-emerald-400 transition-colors shadow-sm disabled:opacity-50">
          <option *ngFor="let yr of yearsForSelectedLevel" [value]="yr">{{yr}}</option>
        </select>
      </div>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto px-4 md:px-8 py-6 md:py-10 w-full overflow-x-hidden">
    <p class="text-[10px] text-slate-400 font-bold text-center mb-2 md:hidden flex items-center justify-center gap-1"><span translate="no" class="material-symbols-outlined notranslate text-[14px]">swipe</span> Swipe schedule left/right</p>

    <div class="bg-white rounded-[1.5rem] md:rounded-[3rem] border border-emerald-100 shadow-xl shadow-emerald-500/5 overflow-hidden w-full">
      <div class="bg-emerald-600 px-4 md:px-10 py-4 md:py-5 flex justify-center text-center">
        <h3 class="text-white font-black uppercase tracking-[0.15em] md:tracking-[0.2em] text-[10px] md:text-sm shadow-sm">{{selectedLevel}} - {{selectedYear}} MANAGEMENT</h3>
      </div>

      <div class="overflow-x-auto custom-scrollbar w-full pb-16 md:pb-32" style="-webkit-overflow-scrolling: touch;">
        <table class="w-full border-collapse text-center min-w-[700px]">
          <thead>
          <tr class="bg-emerald-50/60 border-b border-emerald-100">
            <th class="p-4 md:p-6 border-r border-emerald-100 whitespace-nowrap min-w-[100px] md:min-w-[120px] md:sticky md:left-0 bg-emerald-50/95 backdrop-blur z-20 shadow-[1px_0_0_#d1fae5]"></th>

            <th *ngFor="let h of currentGrid.headers; let j = index; trackBy: trackByIndex" class="p-3 md:p-4 min-w-[160px] md:min-w-[200px] whitespace-nowrap border-r border-emerald-50 last:border-none">
              <input *ngIf="isEditMode" [(ngModel)]="currentGrid.headers[j]" class="w-full bg-white border border-emerald-200 rounded-lg md:rounded-xl p-2 md:p-3 text-[10px] md:text-xs font-black text-center text-emerald-800 uppercase outline-none focus:ring-2 focus:border-emerald-400 shadow-inner transition-all">
              <span *ngIf="!isEditMode" class="text-[10px] md:text-xs font-black text-emerald-800 uppercase tracking-widest block w-full bg-white/50 py-2 rounded-lg border border-white shadow-sm">{{h}}</span>
            </th>

          </tr>
          </thead>
          <tbody class="divide-y divide-emerald-50">
          <tr *ngFor="let day of days; let i = index" class="group hover:bg-emerald-50/30 transition-colors">
            <td class="p-4 md:p-6 font-black text-emerald-700 bg-white md:bg-emerald-50/30 text-[10px] md:text-xs border-r border-emerald-100 whitespace-nowrap md:sticky md:left-0 z-10 shadow-[1px_0_0_#d1fae5] uppercase tracking-widest">
              {{day}}
            </td>

            <td *ngFor="let slot of currentGrid.rows[i]; let j = index; trackBy: trackByIndex" class="p-3 md:p-4 border-l border-emerald-50 bg-white md:bg-transparent">
              <ng-container *ngIf="isEditMode">
                <select *ngIf="selectedLevel !== 'KAFA'" [(ngModel)]="currentGrid.rows[i][j]" class="w-full bg-slate-50 hover:bg-white border border-emerald-200 rounded-lg md:rounded-xl p-2.5 md:p-3 text-[10px] md:text-xs font-bold text-center outline-none focus:ring-2 focus:border-emerald-400 transition-all shadow-sm cursor-pointer">
                  <option value="">- Select Subject -</option>
                  <option *ngFor="let sub of filteredSubjects" [value]="sub.name">{{ sub.name }}</option>
                  <option value="Rest / Recess">Rest / Recess</option>
                </select>
                <textarea *ngIf="selectedLevel === 'KAFA'" [(ngModel)]="currentGrid.rows[i][j]" placeholder="KAFA Activity" class="w-full bg-slate-50 hover:bg-white border border-emerald-200 rounded-lg md:rounded-xl p-2.5 md:p-3 text-[10px] md:text-xs font-bold text-center outline-none focus:ring-2 focus:border-emerald-400 transition-all shadow-sm resize-none h-16 md:h-20"></textarea>
              </ng-container>

              <div *ngIf="!isEditMode" class="min-h-[50px] md:min-h-[60px] flex items-center justify-center p-2 md:p-3 rounded-xl border border-transparent group-hover:border-emerald-100 group-hover:bg-white transition-all">
                <span [ngClass]="currentGrid.rows[i][j] === 'Rest / Recess' ? 'text-orange-500 font-black bg-orange-50 px-3 py-1 rounded-lg border border-orange-100' : 'text-slate-700 font-bold'" class="text-[10px] md:text-xs uppercase tracking-wide break-words leading-tight">{{ currentGrid.rows[i][j] || '-' }}</span>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div *ngIf="isEditMode" class="fixed md:relative bottom-[85px] md:bottom-0 right-4 left-4 md:mt-8 flex justify-center md:justify-end z-50 md:z-0">
      <button (click)="submitSchedule()" class="w-full md:w-auto px-8 md:px-16 py-4 md:py-5 bg-emerald-500 text-white font-black uppercase tracking-widest rounded-xl md:rounded-full shadow-2xl shadow-emerald-500/40 hover:bg-emerald-600 hover:scale-[1.02] transition-transform active:scale-95 flex items-center justify-center gap-2 md:gap-3 text-[10px] md:text-xs border border-emerald-600">
        <span translate="no" class="material-symbols-outlined notranslate text-lg md:text-xl">cloud_done</span> Save & Submit
      </button>
    </div>
  </div>
</div>
