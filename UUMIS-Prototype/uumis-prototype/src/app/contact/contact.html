<div class="min-h-screen bg-[#f8fcfa] font-display text-[#0e1b13] selection:bg-[#30e87a] selection:text-[#0e1b13] relative">
  <app-navbar></app-navbar>

  <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-12 space-y-16 relative">

    <div class="fixed bottom-8 right-8 z-[90] flex flex-col items-end gap-4">
      <button *ngIf="isAdmin" (click)="publishChanges()" class="bg-[#0e1b13] text-white px-6 py-3 rounded-full font-black text-sm shadow-2xl hover:bg-[#30e87a] hover:text-[#0e1b13] hover:scale-105 transition-all flex items-center gap-2 animate-fade-in-up border border-[#e7f3ec]">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">cloud_upload</span> Publish Changes
      </button>

      <div *ngIf="showLangModal" class="bg-white rounded-2xl shadow-2xl border border-[#e7f3ec] p-3 w-48 animate-fade-in-up flex flex-col gap-1">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-3 mt-1">Select Language</h3>
        <button (click)="switchLanguage('en')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-[#f0fdf4] hover:text-[#30e87a] font-bold text-sm transition-colors flex items-center gap-3">
          <span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">EN</span> English
        </button>
        <button (click)="switchLanguage('ms')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-[#f0fdf4] hover:text-[#30e87a] font-bold text-sm transition-colors flex items-center gap-3">
          <span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">MS</span> Melayu
        </button>
      </div>

      <button (click)="toggleLangModal()" class="size-14 rounded-full bg-[#0e1b13] text-white flex items-center justify-center shadow-2xl hover:scale-110 hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all cursor-pointer group">
        <span translate="no" class="material-symbols-outlined notranslate text-2xl group-hover:scale-110 transition-transform">translate</span>
      </button>
    </div>

    <div class="text-center animate-fade-in-up">
      <h1 class="text-4xl md:text-6xl font-black text-[#0e1b13] uppercase tracking-tight">
        Contact <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#30e87a] to-emerald-600">Us</span>
      </h1>
      <p class="text-slate-500 mt-4 text-lg font-bold italic">We are here to assist with your enquiries.</p>

      <button *ngIf="isAdmin" (click)="openEditLocation()" class="mt-6 mx-auto bg-[#0e1b13] text-white px-5 py-2.5 rounded-full font-bold text-sm flex items-center gap-2 hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all shadow-lg">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">add_location</span> Add Section Box
      </button>
    </div>

    <div class="grid md:grid-cols-3 gap-8 animate-fade-in-up">
      <div *ngFor="let loc of pageData.locations; let i = index" class="bg-white p-10 rounded-[2.5rem] border border-[#e7f3ec] text-center space-y-4 hover:border-[#30e87a] hover:shadow-xl transition-all shadow-sm group relative">
        <div *ngIf="isAdmin" class="absolute top-6 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
          <button (click)="openEditLocation(i)" class="size-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all">
            <span translate="no" class="material-symbols-outlined notranslate text-[16px]">edit</span>
          </button>
          <button (click)="pageData.locations.splice(i,1)" class="size-8 rounded-full bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
            <span translate="no" class="material-symbols-outlined notranslate text-[16px]">delete</span>
          </button>
        </div>

        <span *ngIf="loc.icon && loc.icon !== 'none'" translate="no" class="material-symbols-outlined notranslate text-[#30e87a] text-5xl group-hover:scale-110 transition-transform">
          {{loc.icon}}
        </span>

        <h3 class="text-xl font-black uppercase tracking-tight">{{loc.title}}</h3>
        <p class="text-slate-500 text-sm leading-relaxed font-bold whitespace-pre-line">{{loc.address}}</p>
      </div>
    </div>

    <div class="max-w-4xl mx-auto bg-white rounded-[3rem] border border-[#e7f3ec] p-10 shadow-2xl">
      <h2 class="text-2xl font-black text-[#0e1b13] mb-8 uppercase tracking-tight flex items-center gap-3">
        <span translate="no" class="material-symbols-outlined notranslate text-[#30e87a]">send</span> Send a Message
      </h2>
      <form (submit)="sendInquiry()" class="space-y-6">
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-400 uppercase ml-1 tracking-widest">Full Name</label>
          <input type="text" [(ngModel)]="formData.fullName" name="fullName" required class="w-full bg-[#f8fcfa] border border-[#e7f3ec] rounded-2xl p-4 text-[#0e1b13] font-bold focus:border-[#30e87a] outline-none transition-all focus:ring-4 focus:ring-[#30e87a]/10">
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase ml-1 tracking-widest">Contact Number</label>
            <input type="text" [(ngModel)]="formData.contactNum" name="contactNum" required class="w-full bg-[#f8fcfa] border border-[#e7f3ec] rounded-2xl p-4 text-[#0e1b13] font-bold focus:border-[#30e87a] outline-none transition-all focus:ring-4 focus:ring-[#30e87a]/10">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase ml-1 tracking-widest">Email Address</label>
            <input type="email" [(ngModel)]="formData.email" name="email" required class="w-full bg-[#f8fcfa] border border-[#e7f3ec] rounded-2xl p-4 text-[#0e1b13] font-bold focus:border-[#30e87a] outline-none transition-all focus:ring-4 focus:ring-[#30e87a]/10">
          </div>
        </div>
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-400 uppercase ml-1 tracking-widest">Your Message</label>
          <textarea [(ngModel)]="formData.message" name="message" rows="4" required class="w-full bg-[#f8fcfa] border border-[#e7f3ec] rounded-2xl p-4 text-[#0e1b13] font-bold focus:border-[#30e87a] outline-none transition-all focus:ring-4 focus:ring-[#30e87a]/10"></textarea>
        </div>
        <button type="submit" class="w-full bg-[#30e87a] hover:bg-[#25d366] text-[#0e1b13] font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-sm shadow-lg shadow-green-200 hover:scale-[1.02]">
          Send Message
        </button>
      </form>
    </div>
  </main>

  <div *ngIf="editMode === 'location'" class="fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined text-emerald-500 notranslate">edit_location</span>
          Section Details
        </h2>
        <button (click)="editMode = null" class="text-slate-400 hover:text-red-500 transition-colors">
          <span translate="no" class="material-symbols-outlined notranslate">close</span>
        </button>
      </div>

      <div class="p-8 space-y-6">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Box Title</label>
          <input type="text" [(ngModel)]="editData.title" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none focus:border-[#30e87a]">
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Select Icon</label>
          <div class="grid grid-cols-5 gap-2">
            <button *ngFor="let iconName of availableIcons"
                    (click)="editData.icon = iconName"
                    [class]="editData.icon === iconName ? 'bg-[#30e87a] text-[#0e1b13]' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'"
                    class="size-12 rounded-xl flex items-center justify-center transition-all border border-slate-100">
              <span *ngIf="iconName !== 'none'" translate="no" class="material-symbols-outlined notranslate">{{iconName}}</span>
              <span *ngIf="iconName === 'none'" class="text-[10px] font-black uppercase">None</span>
            </button>
          </div>
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Details / Address</label>
          <textarea [(ngModel)]="editData.address" rows="4" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none focus:border-[#30e87a]"></textarea>
        </div>
      </div>

      <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50/50">
        <button (click)="editMode = null" class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">Cancel</button>
        <button (click)="saveLocation()" class="px-6 py-2.5 rounded-xl font-bold bg-[#0e1b13] text-white hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined notranslate">save</span> Save Box
        </button>
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
