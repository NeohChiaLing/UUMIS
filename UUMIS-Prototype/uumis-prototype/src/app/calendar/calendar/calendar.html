<div class="min-h-screen bg-transparent font-display text-slate-900 relative flex flex-col overflow-x-hidden">

  <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
    <div class="absolute -top-40 -right-40 w-[800px] h-[800px] bg-sky-200/40 rounded-full blur-[120px] bubble-float"></div>
    <div class="absolute top-1/4 -left-48 w-[600px] h-[600px] bg-blue-400/20 rounded-full blur-[100px] bubble-float-alt" style="animation-delay: -5s;"></div>
    <div class="absolute -bottom-20 left-1/3 w-[500px] h-[500px] bg-purple-200/30 rounded-full blur-[90px] bubble-float" style="animation-delay: -10s;"></div>

    <div class="absolute top-[15%] right-[15%] w-32 h-32 rounded-full glass-bubble border border-white/40 bubble-float z-10" style="animation-duration: 15s;"></div>
    <div class="absolute bottom-[20%] left-[10%] w-48 h-48 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -2s; animation-duration: 25s;"></div>
    <div class="absolute top-1/2 right-[5%] w-24 h-24 rounded-full glass-bubble border border-white/20 bubble-float z-10" style="animation-delay: -7s;"></div>
    <div class="absolute top-[10%] left-[20%] w-16 h-16 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -12s;"></div>

    <div class="absolute top-[20%] left-[10%] opacity-[0.08] transform -rotate-12 bubble-float text-slate-800" style="animation-duration: 20s;">
      <span translate="no" class="material-symbols-outlined notranslate text-[15rem]" style="font-variation-settings: 'wght' 100;">menu_book</span>
    </div>
    <div class="absolute bottom-[15%] right-[10%] opacity-[0.08] transform rotate-12 bubble-float-alt text-slate-800" style="animation-duration: 25s;">
      <span translate="no" class="material-symbols-outlined notranslate text-[18rem]" style="font-variation-settings: 'wght' 100;">school</span>
    </div>
  </div>

  <app-navbar></app-navbar>

  <section class="relative w-full h-[calc(100vh-80px)] min-h-[600px] flex items-center justify-center text-center group rounded-b-[3rem] sm:rounded-b-[4rem] overflow-hidden shadow-2xl mt-0">
    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-105 z-0"
         [style.background-image]="'url(' + pageData.bgImage + ')'">
    </div>

    <div class="absolute inset-0 bg-black/40 z-0"></div>

    <button *ngIf="isAdmin" (click)="openEditModal('header')" class="absolute top-6 right-6 z-50 bg-white hover:bg-sky-500 hover:text-white text-slate-800 rounded-full px-4 py-2 shadow-lg font-bold text-sm flex items-center gap-2 transition-all opacity-0 group-hover:opacity-100">
      <span translate="no" class="material-symbols-outlined notranslate text-[18px]">edit</span> Edit Background
    </button>

    <div class="relative z-10 flex flex-col items-center gap-8 max-w-4xl mx-auto px-4 sm:px-6 animate-fade-in-up mt-8">
      <div class="flex flex-col gap-4 items-center">
        <span class="inline-block px-4 py-1.5 rounded-full bg-sky-500/30 backdrop-blur-md border border-sky-400/30 text-sky-100 text-xs font-black uppercase tracking-wider w-fit shadow-lg">
          {{ pageData.badge }}
        </span>
        <h1 class="text-5xl sm:text-7xl md:text-8xl font-black leading-[1.1] tracking-tighter text-white drop-shadow-2xl uppercase">
          {{ pageData.titleStart }} <br/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-300 to-sky-100 drop-shadow-lg">{{ pageData.titleHighlight }}</span>
        </h1>
        <p class="text-white text-lg sm:text-xl font-bold max-w-2xl mx-auto leading-relaxed mt-2 drop-shadow-xl italic">
          {{ pageData.description }}
        </p>
      </div>
    </div>
  </section>

  <main class="flex-grow w-full max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-16 relative z-10">

    <div class="fixed bottom-8 right-8 z-[90] flex flex-col items-end gap-4">
      <button *ngIf="isAdmin" (click)="publishChanges()" class="bg-slate-900 text-white px-6 py-3 rounded-full font-black text-sm shadow-2xl hover:bg-sky-500 transition-all flex items-center gap-2 animate-fade-in-up border border-slate-700">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">cloud_upload</span> Publish Changes
      </button>

      <div *ngIf="showLangModal" class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl border border-white p-3 w-48 animate-fade-in-up flex flex-col gap-1">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-3 mt-1">Select Language</h3>
        <button (click)="switchLanguage('en')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-sky-50 hover:text-sky-500 font-bold text-sm transition-colors flex items-center gap-3">
          <span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">EN</span> English
        </button>
        <button (click)="switchLanguage('ms')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-sky-50 hover:text-sky-500 font-bold text-sm transition-colors flex items-center gap-3">
          <span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">MS</span> Melayu
        </button>
      </div>

      <button (click)="toggleLangModal()" class="size-14 rounded-full bg-slate-900 text-white flex items-center justify-center shadow-2xl hover:scale-110 hover:bg-sky-500 transition-all cursor-pointer group border border-slate-700">
        <span translate="no" class="material-symbols-outlined notranslate text-2xl group-hover:scale-110 transition-transform">translate</span>
      </button>
    </div>

    <div class="text-center animate-fade-in-up">
      <button *ngIf="isAdmin" (click)="openEditSemester()" class="mt-6 mx-auto bg-slate-900 text-white px-6 py-3 rounded-full font-black text-sm flex items-center gap-2 hover:bg-sky-500 transition-all shadow-lg border border-slate-700">
        <span translate="no" class="material-symbols-outlined text-[18px] notranslate">add_circle</span> Add New Semester
      </button>
    </div>

    <section *ngFor="let sem of pageData.semesters; let i = index" class="relative space-y-6 group">
      <div class="bg-white/80 backdrop-blur-md p-8 border border-white rounded-[2.5rem] shadow-lg group-hover:border-sky-500/30 transition-all relative">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 border-b border-slate-200/50 pb-6">
          <div class="flex items-center gap-4">
            <div class="size-14 rounded-2xl bg-sky-50 flex items-center justify-center text-sky-500 border border-white shadow-sm">
              <span translate="no" class="material-symbols-outlined notranslate text-2xl">calendar_month</span>
            </div>
            <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight">
              {{ sem.name }}
            </h2>
          </div>

          <div *ngIf="isAdmin" class="flex gap-2">
            <button (click)="openEditSemester(i)" class="size-10 rounded-full bg-white text-sky-700 flex items-center justify-center hover:bg-sky-500 hover:text-white transition-all shadow-md">
              <span translate="no" class="material-symbols-outlined text-[18px] notranslate">edit</span>
            </button>
            <button (click)="deleteSemester(i)" class="size-10 rounded-full bg-white text-red-600 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-md">
              <span translate="no" class="material-symbols-outlined text-[18px] notranslate">delete</span>
            </button>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
          <div *ngFor="let img of sem.images" class="bg-slate-50/50 rounded-[2rem] border border-slate-200 overflow-hidden group/img relative shadow-sm hover:shadow-xl transition-all">
            <img [src]="img" alt="Calendar Page" class="w-full h-auto object-contain block mx-auto mix-blend-darken">
          </div>
        </div>
      </div>
    </section>

  </main>

  <div *ngIf="editMode === 'header'" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">Edit Section</h2>
        <button (click)="closeEditModal()" class="text-slate-400 hover:text-red-500 transition-colors"><span translate="no" class="material-symbols-outlined notranslate">close</span></button>
      </div>

      <div class="p-6 flex flex-col gap-4 overflow-y-auto custom-scrollbar">
        <div><label class="text-xs font-bold text-slate-500 uppercase block mb-1">Badge Text</label><input type="text" [(ngModel)]="editData.badge" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-sky-500"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase block mb-1">Title Start</label><input type="text" [(ngModel)]="editData.titleStart" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-sky-500"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase block mb-1">Title Highlight</label><input type="text" [(ngModel)]="editData.titleHighlight" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-sky-500"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase block mb-1">Description</label><textarea [(ngModel)]="editData.description" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-sky-500"></textarea></div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase block mb-1 mt-2">Background Image</label>
          <div class="flex flex-col gap-4">
            <input type="file" #bgInput (change)="onFileSelectedSingle($event, 'bgImage')" accept="image/*" class="hidden">
            <button (click)="bgInput.click()" class="w-fit px-4 py-2 bg-sky-100 text-sky-700 font-bold rounded-lg hover:bg-sky-200 flex items-center gap-2 transition-colors"><span translate="no" class="material-symbols-outlined notranslate text-[18px]">upload_file</span> Choose Image</button>
            <div *ngIf="editData.bgImage" class="h-24 w-full rounded-xl bg-cover bg-center border border-slate-200 shadow-inner" [style.background-image]="'url(' + editData.bgImage + ')'"></div>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50/50 mt-auto">
        <button (click)="closeEditModal()" class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">Cancel</button>
        <button (click)="saveEdits()" class="px-6 py-2.5 rounded-xl font-bold bg-slate-900 text-white hover:bg-sky-500 shadow-lg transition-all flex items-center gap-2"><span translate="no" class="material-symbols-outlined text-[18px] notranslate">save</span> Save</button>
      </div>
    </div>
  </div>

  <div *ngIf="editMode === 'semester'" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">

      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined text-sky-500 notranslate">edit_calendar</span>
          Edit Semester
        </h2>
        <button (click)="editMode = null" class="text-slate-400 hover:text-red-500 transition-colors">
          <span translate="no" class="material-symbols-outlined notranslate">close</span>
        </button>
      </div>

      <div class="p-6 flex flex-col gap-6 overflow-y-auto">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Semester Name</label>
          <input type="text" [(ngModel)]="editData.name" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none focus:border-sky-500">
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Calendar Images</label>
          <div class="flex flex-col gap-4">
            <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" multiple class="hidden">
            <button type="button" (click)="fileInput.click()" class="w-full py-3 bg-sky-50 text-sky-700 border-2 border-dashed border-sky-200 font-bold rounded-xl hover:bg-sky-100 transition-colors flex items-center justify-center gap-2">
              <span translate="no" class="material-symbols-outlined notranslate">upload_file</span> Choose High-Res Photos
            </button>

            <div class="grid grid-cols-3 gap-2 mt-2">
              <div *ngFor="let img of editData.images; let imgIdx = index" class="relative group h-24 bg-slate-100 rounded-lg border overflow-hidden">
                <img [src]="img" class="w-full h-full object-cover">
                <button (click)="removeImage(imgIdx)" class="absolute inset-0 bg-red-500/80 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50/50">
        <button (click)="editMode = null" class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">Cancel</button>
        <button (click)="saveSemester()" class="px-6 py-2.5 rounded-xl font-bold bg-slate-900 text-white hover:bg-sky-500 shadow-lg transition-all flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined text-[18px] notranslate">save</span> Save Semester
        </button>
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
