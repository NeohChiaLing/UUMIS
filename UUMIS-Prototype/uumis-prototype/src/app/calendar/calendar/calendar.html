<div class="min-h-screen bg-[#f8fcfa] font-display text-[#0e1b13] selection:bg-[#30e87a] selection:text-[#0e1b13] relative">
  <app-navbar></app-navbar>

  <main class="flex-grow w-full max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-16 relative">

    <div class="fixed bottom-8 right-8 z-[90] flex flex-col items-end gap-4">
      <button *ngIf="isAdmin" (click)="publishChanges()" class="bg-[#0e1b13] text-white px-6 py-3 rounded-full font-black text-sm shadow-2xl hover:bg-[#30e87a] hover:text-[#0e1b13] hover:scale-105 transition-all flex items-center gap-2 animate-fade-in-up border border-[#e7f3ec]">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">cloud_upload</span> Publish Changes
      </button>

      <div *ngIf="showLangModal" class="bg-white rounded-2xl shadow-2xl border border-[#e7f3ec] p-3 w-48 animate-fade-in-up flex flex-col gap-1">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-3 mt-1">Select Language</h3>
        <button (click)="switchLanguage('en')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-[#f0fdf4] hover:text-[#30e87a] font-bold text-sm transition-colors flex items-center gap-3">
          <span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">EN</span> English
        </button>
        <button (click)="switchLanguage('ms')" class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-[#f0fdf4] hover:text-[#30e87a] font-bold text-sm transition-colors flex items-center gap-3">
          <span class="text-[10px] px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-black">MS</span> Melayu
        </button>
      </div>

      <button (click)="toggleLangModal()" class="size-14 rounded-full bg-[#0e1b13] text-white flex items-center justify-center shadow-2xl hover:scale-110 hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all cursor-pointer group">
        <span translate="no" class="material-symbols-outlined notranslate text-2xl group-hover:scale-110 transition-transform">translate</span>
      </button>
    </div>

    <div class="text-center animate-fade-in-up">
      <h1 class="text-3xl md:text-5xl font-black text-[#0e1b13] uppercase tracking-tight">
        Academic <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#30e87a] to-emerald-600">Calendar</span>
      </h1>
      <p class="text-slate-500 mt-4 italic font-bold">** The scheduled dates for events are not final and subject to change</p>

      <button *ngIf="isAdmin" (click)="openEditSemester()" class="mt-6 mx-auto bg-[#0e1b13] text-white px-5 py-2.5 rounded-full font-bold text-sm flex items-center gap-2 hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all shadow-lg">
        <span translate="no" class="material-symbols-outlined text-[18px] notranslate">add_circle</span> Add New Semester
      </button>
    </div>

    <section *ngFor="let sem of pageData.semesters; let i = index" class="relative space-y-6 group">
      <div class="bg-white p-6 border border-[#e7f3ec] rounded-[2.5rem] shadow-sm group-hover:border-[#30e87a] transition-all relative">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
          <div class="flex items-center gap-4">
            <div class="size-12 rounded-2xl bg-[#f0fdf4] flex items-center justify-center text-[#30e87a] border border-[#e7f3ec]">
              <span translate="no" class="material-symbols-outlined notranslate">calendar_month</span>
            </div>
            <h2 class="text-2xl font-black text-[#0e1b13] uppercase tracking-tight">
              {{ sem.name }}
            </h2>
          </div>

          <div *ngIf="isAdmin" class="flex gap-2">
            <button (click)="openEditSemester(i)" class="size-10 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center hover:bg-[#30e87a] hover:text-[#0e1b13] transition-all shadow-sm">
              <span translate="no" class="material-symbols-outlined text-[18px] notranslate">edit</span>
            </button>
            <button (click)="deleteSemester(i)" class="size-10 rounded-full bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-sm">
              <span translate="no" class="material-symbols-outlined text-[18px] notranslate">delete</span>
            </button>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
          <div *ngFor="let img of sem.images" class="bg-slate-50 rounded-[2rem] border border-[#e7f3ec] overflow-hidden group/img relative shadow-sm hover:shadow-md transition-all">
            <img [src]="img" alt="Calendar Page" class="w-full h-auto object-contain block mx-auto">
          </div>
        </div>
      </div>
    </section>

  </main>

  <div *ngIf="editMode === 'semester'" class="fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">

      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined text-emerald-500 notranslate">edit_calendar</span>
          Edit Semester
        </h2>
        <button (click)="editMode = null" class="text-slate-400 hover:text-red-500 transition-colors">
          <span translate="no" class="material-symbols-outlined notranslate">close</span>
        </button>
      </div>

      <div class="p-6 flex flex-col gap-6 overflow-y-auto">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Semester Name</label>
          <input type="text" [(ngModel)]="editData.name" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none focus:border-emerald-500">
        </div>

        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Calendar Images</label>
          <div class="flex flex-col gap-4">
            <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" multiple class="hidden">
            <button type="button" (click)="fileInput.click()" class="w-full py-3 bg-emerald-50 text-emerald-700 border-2 border-dashed border-emerald-200 font-bold rounded-xl hover:bg-emerald-100 transition-colors flex items-center justify-center gap-2">
              <span translate="no" class="material-symbols-outlined notranslate">upload_file</span> Choose High-Res Photos
            </button>

            <div class="grid grid-cols-3 gap-2 mt-2">
              <div *ngFor="let img of editData.images; let imgIdx = index" class="relative group h-24 bg-slate-100 rounded-lg border overflow-hidden">
                <img [src]="img" class="w-full h-full object-cover">
                <button (click)="removeImage(imgIdx)" class="absolute inset-0 bg-red-500/80 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50/50">
        <button (click)="editMode = null" class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors">Cancel</button>
        <button (click)="saveSemester()" class="px-6 py-2.5 rounded-xl font-bold bg-[#0e1b13] text-white hover:bg-[#30e87a] hover:text-[#0e1b13] shadow-lg transition-all flex items-center gap-2">
          <span translate="no" class="material-symbols-outlined text-[18px] notranslate">save</span> Save Semester
        </button>
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
