<div class="min-h-screen bg-transparent font-display text-slate-900 relative flex flex-col overflow-x-hidden pb-32">
  <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
    <div class="absolute -top-40 -right-40 w-[800px] h-[800px] bg-sky-200/40 rounded-full blur-[120px] bubble-float"></div>
    <div class="absolute top-1/4 -left-48 w-[600px] h-[600px] bg-blue-400/20 rounded-full blur-[100px] bubble-float-alt" style="animation-delay: -5s;"></div>
    <div class="absolute -bottom-20 left-1/3 w-[500px] h-[500px] bg-purple-200/30 rounded-full blur-[90px] bubble-float" style="animation-delay: -10s;"></div>
    <div class="absolute top-[15%] right-[15%] w-32 h-32 rounded-full glass-bubble border border-white/40 bubble-float z-10" style="animation-duration: 15s;"></div>
    <div class="absolute bottom-[20%] left-[10%] w-48 h-48 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -2s; animation-duration: 25s;"></div>
    <div class="absolute top-1/2 right-[5%] w-24 h-24 rounded-full glass-bubble border border-white/20 bubble-float z-10" style="animation-delay: -7s;"></div>
    <div class="absolute top-[10%] left-[20%] w-16 h-16 rounded-full glass-bubble border border-white/30 bubble-float-alt z-10" style="animation-delay: -12s;"></div>
    <div class="absolute top-[20%] left-[10%] opacity-[0.08] transform -rotate-12 bubble-float text-slate-800 hidden md:block" style="animation-duration: 20s;"><span translate="no" class="material-symbols-outlined notranslate text-[15rem]" style="font-variation-settings: 'wght' 100;">menu_book</span></div>
    <div class="absolute bottom-[15%] right-[10%] opacity-[0.08] transform rotate-12 bubble-float-alt text-slate-800 hidden md:block" style="animation-duration: 25s;"><span translate="no" class="material-symbols-outlined notranslate text-[18rem]" style="font-variation-settings: 'wght' 100;">school</span></div>
  </div>
  <app-navbar></app-navbar>

  <section class="relative w-full h-auto md:h-[calc(100vh-80px)] min-h-[500px] md:min-h-[600px] flex items-center justify-center text-center group rounded-b-[2rem] sm:rounded-b-[4rem] overflow-hidden shadow-2xl mt-0 py-16 md:py-0">
    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-105 z-0" [style.background-image]="'url(' + pageData.bgImage + ')'"></div>
    <div class="absolute inset-0 bg-black/40 z-0"></div>

    <button *ngIf="isAdmin" (click)="openEditModal('header')" class="absolute top-4 right-4 md:top-6 md:right-6 z-50 bg-white hover:bg-sky-500 hover:text-white text-slate-800 rounded-full px-4 py-2 shadow-lg font-bold text-sm flex items-center gap-2 transition-all opacity-100 md:opacity-0 group-hover:opacity-100">
      <span translate="no" class="material-symbols-outlined notranslate text-[18px]">edit</span> <span class="hidden md:inline">Edit Background</span>
    </button>

    <div class="relative z-10 flex flex-col items-center gap-6 md:gap-8 max-w-4xl mx-auto px-4 sm:px-6 animate-fade-in-up mt-4 md:mt-8">
      <div class="flex flex-col gap-4 items-center w-full">
        <span class="inline-block px-4 py-1.5 rounded-full bg-sky-500/30 backdrop-blur-md border border-sky-400/30 text-sky-100 text-xs font-black uppercase tracking-wider w-fit shadow-lg">
          {{ pageData.badge }}
        </span>
        <h1 class="text-4xl sm:text-6xl md:text-8xl font-black leading-[1.2] md:leading-[1.1] tracking-tighter text-white drop-shadow-2xl uppercase">
          {{ pageData.titleStart }} <br class="hidden md:block"/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-300 to-sky-100 drop-shadow-lg">{{ pageData.titleHighlight }}</span>
        </h1>
        <p class="text-white/90 text-sm sm:text-lg md:text-xl font-bold max-w-2xl mx-auto leading-relaxed mt-1 md:mt-2 drop-shadow-xl italic px-2">
          {{ pageData.description }}
        </p>
      </div>
    </div>
  </section>

  <main class="flex-grow w-full max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 space-y-12 md:space-y-16 relative z-10">

    <div class="fixed bottom-24 right-4 md:right-8 z-[90] flex flex-col items-end gap-4">
      <button *ngIf="isAdmin" (click)="publishChanges()" class="bg-slate-900 text-white px-4 md:px-6 py-3 rounded-full font-black text-xs md:text-sm shadow-2xl hover:bg-sky-500 transition-all flex items-center gap-2 animate-fade-in-up border border-slate-700">
        <span translate="no" class="material-symbols-outlined notranslate text-[18px]">cloud_upload</span> <span class="hidden md:inline">Publish Changes</span><span class="md:hidden">Save</span>
      </button>
    </div>

    <div class="text-center animate-fade-in-up">
      <button *ngIf="isAdmin" (click)="openEditSemester()" class="mt-4 md:mt-6 mx-auto bg-slate-900 text-white px-4 md:px-6 py-2.5 md:py-3 rounded-full font-black text-xs md:text-sm flex items-center gap-2 hover:bg-sky-500 transition-all shadow-lg border border-slate-700">
        <span translate="no" class="material-symbols-outlined text-[16px] md:text-[18px] notranslate">add_circle</span> Add New Semester
      </button>
    </div>

    <section *ngFor="let sem of pageData.semesters; let i = index" class="relative space-y-6 group mt-4 md:mt-8">
      <div class="bg-white/80 backdrop-blur-md p-6 sm:p-8 border border-white rounded-[1.5rem] md:rounded-[2.5rem] shadow-lg group-hover:border-sky-500/30 transition-all relative">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 md:mb-8 border-b border-slate-200/50 pb-4 md:pb-6">
          <div class="flex items-center gap-3 md:gap-4">
            <div class="size-12 md:size-14 rounded-xl md:rounded-2xl bg-sky-50 flex items-center justify-center text-sky-500 border border-white shadow-sm shrink-0">
              <span translate="no" class="material-symbols-outlined notranslate text-xl md:text-2xl">calendar_month</span>
            </div>
            <h2 class="text-xl md:text-2xl font-black text-slate-900 uppercase tracking-tight">
              {{ sem.name }}
            </h2>
          </div>
          <div *ngIf="isAdmin" class="flex gap-2 w-full sm:w-auto justify-end">
            <button (click)="openEditSemester(i)" class="size-8 md:size-10 rounded-full bg-white text-sky-700 flex items-center justify-center hover:bg-sky-500 hover:text-white transition-all shadow-md"><span translate="no" class="material-symbols-outlined text-[14px] md:text-[18px] notranslate">edit</span></button>
            <button (click)="deleteSemester(i)" class="size-8 md:size-10 rounded-full bg-white text-red-600 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-md"><span translate="no" class="material-symbols-outlined text-[14px] md:text-[18px] notranslate">delete</span></button>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
          <div *ngFor="let img of sem.images" class="bg-slate-50/50 rounded-[1.5rem] md:rounded-[2rem] border border-slate-200 overflow-hidden group/img relative shadow-sm hover:shadow-xl transition-all">
            <img [src]="img" alt="Calendar Page" class="w-full h-auto object-contain block mx-auto mix-blend-darken">
          </div>
        </div>
      </div>
    </section>

  </main>
  <app-footer></app-footer>
</div>
