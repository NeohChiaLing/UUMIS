version: '3.8'

services:
  # 1. The Database Container
  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uumis_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    # --- ADD THIS HEALTHCHECK ---
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. The Spring Boot Backend Container
  backend:
    build:
      context: ./uumis-spring-backend
    ports:
      - "8080:8080"
    # --- UPDATE THIS DEPENDS_ON ---
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      # This forces Spring Boot to connect to the Docker MySQL instead of your laptop's local MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/uumis_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"

  # 3. The Angular Frontend Container
  frontend:
    build:
      context: ./uumis-prototype/uumis-prototype
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  db_data: